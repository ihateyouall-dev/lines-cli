name: Build

on:
  push:
  pull_request:

jobs:
  Linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: pip install conan --break-system-packages

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ runner.arch }}-

      - name: Detect profile
        run: conan profile detect --force

      - name: Install deps
        run: make install-deps CONAN_BUILD_TYPE=Debug

      - name: Configure
        run: cmake --preset debug-gcc

      - name: Build
        run: cmake --build --preset debug-gcc

      - name: Test
        run: ctest --preset debug-gcc
  macOS:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5

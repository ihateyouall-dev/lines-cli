      - name: Test
        run: ctest --preset debug-clang
  Windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: pip install conan --break-system-packages

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ runner.arch }}-

      - name: Detect profile
        run: conan profile detect --force

      - name: Install deps
        run: make install-deps CONAN_BUILD_TYPE=Debug

      - name: Configure
        run: cmake --preset debug-msvc

      - name: Build
        run: cmake --build --preset debug-msvc

      - name: Test
        run: ctest --preset debug-msvc
